services:
  microbook-maker:
    image: dovieuu/microbook-maker:latest
    ports:
      - "7777:7777"
    volumes:
      - mbm-generated:/app/be/generated
      - mbm-uploads:/app/be/uploads
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7777/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mbm-generated:
  mbm-uploads:
